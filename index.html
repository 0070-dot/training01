<!-- HTML5 문서 선언 -->
<!DOCTYPE html>

<!-- 문서의 시작 / 언어는 한국어 -->
<html lang="ko">

<head>
    <!-- 문자 인코딩 설정 (한글 깨짐 방지) -->
    <meta charset="UTF-8">

    <!-- 반응형 웹 설정 (모바일에서 화면 크기 맞추기) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 브라우저 탭 제목 -->
    <title>html 01 - tag를 알아보자.</title>

    <style>
        /* div는 블록 요소 (줄 전체 차지) */
        div {
            background: #f00;
            /* 배경 빨강 */
            width: 400px;
            /* 가로 크기 */
            height: 400px;
            /* 세로 크기 */

            margin-top: 40px;
            /* 위 바깥 여백 */
            margin-bottom: 40px;
            /* 아래 바깥 여백 */

            padding-left: 40px;
            /* 왼쪽 안쪽 여백 */
            padding-right: 40px;
            /* 오른쪽 안쪽 여백 */

            border: 1px solid #333;
            /* 테두리 */
        }

        /* span, a는 인라인 요소 */
        span,
        a {
            background: #ff0;
            /* 배경 노랑 */

            /* ❗ 인라인 요소는 width/height 적용 안 됨 */
            width: 400px;
            height: 400px;

            /* ❗ 인라인 요소는 margin-top/bottom 적용 거의 안 됨 */
            margin-top: 40px;
            margin-bottom: 40px;

            /* 좌우 패딩은 적용됨 */
            padding-left: 40px;
            padding-right: 40px;

            /* 상하 패딩도 보이긴 하지만 레이아웃에는 영향 제한적 */
            padding-top: 40px;
            padding-bottom: 40px;
        }
    </style>
</head>


<body>
    <!-- 
        ❗ 마진 관련 핵심 개념
        
        1. 첫 번째 요소의 margin-top은 부모와 겹칠 수 있음 (margin collapse)
        → 그래서 "첫번째 박스에 margin-top 주는게 아님"

        2. 마지막 요소의 margin-bottom도 부모와 겹칠 수 있음
        → 바깥으로 빠져나가는 느낌
        
        👉 이걸 "마진 병합(margin collapse)"이라고 함
    -->

    <!---->

    <!-- 블록 요소: 줄바꿈 발생, width/height/margin/padding 전부 정상 적용 -->
    <div>box</div>
    <div>box</div>

    <!-- 인라인 요소: 줄 안에서 흐름 유지 -->
    <span>inline</span>
    <span>inline</span>

    <!-- a 태그도 기본적으로 인라인 요소 (링크) -->
    <a href="">inline</a>
</body>

</html>
